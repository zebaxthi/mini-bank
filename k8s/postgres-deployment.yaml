apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-bank-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-bank-postgres
  template:
    metadata:
      labels:
        app: mini-bank-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: minibank
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
