apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mini-bank-postgres
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /data/minibank/postgres
  claimRef:
    namespace: default
    name: postgres-data-mini-bank-postgres-0
