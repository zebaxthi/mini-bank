services:
  postgres:
    image: postgres:16
    container_name: minibank-postgres
    environment:
      POSTGRES_DB: minibank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minibank"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: mini-bank
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minibank
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_H2_CONSOLE_ENABLED: "false"
      JWT_SECRET: 7f4c9d8a1b2e3f4051627384950abcdef1234567890fedcba9876543210abcd
      JWT_EXPIRATION_MS: "3600000"
      API_KEY: 6IHTP4e5GwaPnuRaEu6mKHCZaZi46cvJ

